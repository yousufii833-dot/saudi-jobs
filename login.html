<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>توظيف السعودية | تسجيل الدخول</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0a2b3d, #1a4a6e);
            padding: 2rem;
        }
        .login-card {
            background: white;
            border-radius: 32px;
            padding: 2.5rem;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }
        .login-card h2 {
            text-align: center;
            color: #1a4a6e;
            margin-bottom: 0.5rem;
        }
        .login-sub {
            text-align: center;
            color: #666;
            margin-bottom: 2rem;
        }
        .input-group {
            margin-bottom: 1.5rem;
        }
        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: #333;
        }
        .input-group input {
            width: 100%;
            padding: 1rem;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s;
        }
        .input-group input:focus {
            outline: none;
            border-color: #1a4a6e;
        }
        .btn-login {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #1a4a6e, #0a2b3d);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        .register-link {
            text-align: center;
            margin-top: 1.5rem;
        }
        .register-link a {
            color: #1a4a6e;
            text-decoration: none;
            font-weight: bold;
        }
        .error-message {
            background: #ff4757;
            color: white;
            padding: 0.75rem;
            border-radius: 12px;
            margin-bottom: 1rem;
            display: none;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <h2>توظيف السعودية</h2>
            <p class="login-sub">أكبر منصة توظيف في المملكة</p>
            <div id="errorMsg" class="error-message"></div>
            <form id="loginForm">
                <div class="input-group">
                    <label>البريد الإلكتروني</label>
                    <input type="email" id="email" placeholder="example@domain.com" required autocomplete="email">
                </div>
                <div class="input-group">
                    <label>كلمة المرور</label>
                    <input type="password" id="password" placeholder="********" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn-login">تسجيل الدخول</button>
            </form>
            <div class="register-link">
                ليس لديك حساب؟ <a href="register.html">إنشاء حساب جديد</a>
            </div>
        </div>
    </div>

    <script src="get-data.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            
            if (!email || !password) {
                showError('يرجى إدخال البريد الإلكتروني وكلمة المرور');
                return;
            }
            
            const result = SaudiJobsDB.loginUser(email, password);
            
            if (result.success) {
                localStorage.setItem('currentUserId', result.userId);
                localStorage.setItem('currentUserEmail', result.email);
                window.location.href = 'index.html';
            } else {
                showError(result.message);
            }
        });
        
        function showError(msg) {
            const div = document.getElementById('errorMsg');
            div.textContent = msg;
            div.style.display = 'block';
            setTimeout(() => div.style.display = 'none', 3000);
        }
    </script>
</body>
</html>
